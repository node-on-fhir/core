          group-name: structured-data-capture
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.questionnaires.js tests/nightwatch/honeycomb/enable_autopublish/crud.questionnaireresponses.js"
      
      - test-group:
          name: clinical-trials
          group-name: clinical-trials
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.researchstudy.js tests/nightwatch/honeycomb/enable_autopublish/crud.researchsubjects.js"
      
      - test-group:
          name: administrative
          group-name: administrative
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.consents.js tests/nightwatch/honeycomb/enable_autopublish/crud.tasks.js tests/nightwatch/honeycomb/crud.plandefinitions.js"

      - test-group:
