jobs:
  # Job template that runs a specific group of tests
  test-group:
    parameters:
      group-name:
        type: string
      test-files:
        type: string
      disable-auto-login:
        type: boolean
        default: false
    docker:
      - image: cimg/node:20.11.0-browsers
        environment:
          CIRCLE_ARTIFACTS: /tmp/circleci-artifacts
          CIRCLE_TEST_REPORTS: /tmp/circleci-test-results
          TZ: "America/Chicago"
          NODE_ENV: test
          NIGHTWATCH: true
          DISPLAY: :99.0
          NODE_OPTIONS: --max_old_space_size=4096
          TOOL_NODE_FLAGS: --max_old_space_size=4096
          TEST_BROWSER_DRIVER: chrome
          MONGO_URL: mongodb://mongo:27017/meteor_test
          ENABLE_AUTOPUBLISH: true
          DEV_AUTO_LOGIN: true
          DEV_AUTO_USERNAME: "demouser"
          DEV_AUTO_PASSWORD: "password2025"
          TEST_RUN: true
          METEOR_DISABLE_OPTIMISTIC_CACHING: 1
          METEOR_PROFILE: 100
      - image: mongo:6.0
        name: mongo
    
    resource_class: medium  # Can use medium for parallel execution
    parallelism: 1  # Ensure we're not trying to parallelize within the job
    
    steps:
      - checkout
      
      - run:
          name: Install Chrome with retry
          command: |
            # Update package lists with retry
            for i in {1..3}; do
              echo "Attempt $i to update package lists..."
              sudo apt-get update && break || sleep 10
            done
            
            # Install Chrome dependencies and tools
            sudo apt-get install -y wget gnupg jq unzip curl
            
            # Add Chrome repository
            wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
            
            # Update again and install Chrome with retry
            for i in {1..3}; do
              echo "Attempt $i to install Chrome..."
              sudo apt-get update && sudo apt-get install -y google-chrome-stable && break || {
                echo "Failed attempt $i, cleaning apt cache..."
                sudo apt-get clean
                sudo rm -rf /var/lib/apt/lists/*
                sleep 10
              }
            done
            
            # Verify installation
            google-chrome --version || {
              echo "Chrome installation failed!"
              exit 1
            }
      
      - run:
          name: Install ChromeDriver
          command: |
            # Get Chrome version
            CHROME_VERSION=$(google-chrome --version | awk '{print $3}')
            echo "Chrome version: $CHROME_VERSION"
            
            # Use Chrome for Testing endpoints for newer Chrome versions
            CHROME_MAJOR=$(echo $CHROME_VERSION | cut -d'.' -f1)
            
            if [ "$CHROME_MAJOR" -ge "115" ]; then
              # Use new Chrome for Testing API
              echo "Using Chrome for Testing API for Chrome $CHROME_MAJOR"
              
              # Get the latest ChromeDriver version for this Chrome version
              CHROMEDRIVER_URL=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json" | \
                jq -r ".versions[] | select(.version | startswith(\"$CHROME_VERSION\")) | .downloads.chromedriver[] | select(.platform==\"linux64\") | .url" | \
                head -n 1)
              
              if [ -z "$CHROMEDRIVER_URL" ]; then
                # Fallback to latest stable
                echo "Exact version not found, using latest stable ChromeDriver"
                CHROMEDRIVER_URL=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json" | \
                  jq -r '.channels.Stable.downloads.chromedriver[] | select(.platform=="linux64") | .url')
              fi
              
              echo "Downloading ChromeDriver from: $CHROMEDRIVER_URL"
              wget -q "$CHROMEDRIVER_URL" -O chromedriver.zip
              unzip -q chromedriver.zip
              sudo mv chromedriver-linux64/chromedriver /usr/local/bin/
            else
              # Use old API for older Chrome versions
              echo "Using legacy ChromeDriver API for Chrome $CHROME_MAJOR"
              CHROMEDRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_MAJOR")
              echo "Installing ChromeDriver version: $CHROMEDRIVER_VERSION"
              
              wget -q "https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip"
              unzip -q chromedriver_linux64.zip
              sudo mv chromedriver /usr/local/bin/
            fi
            
            sudo chmod +x /usr/local/bin/chromedriver
            
            # Verify installation
            chromedriver --version || {
              echo "ChromeDriver installation failed!"
              exit 1
            }
      
      - run:
          name: Verify Chrome and ChromeDriver
          command: |
            echo "Chrome version:"
            google-chrome --version || echo "Chrome not found"
            echo "ChromeDriver version:"
            chromedriver --version || echo "ChromeDriver not found"
            echo "ChromeDriver location:"
            which chromedriver || echo "ChromeDriver not in PATH"
      
      - run:
          name: Create directories
          command: |
            mkdir -p $CIRCLE_ARTIFACTS $CIRCLE_TEST_REPORTS
            mkdir -p tests/output tests/screenshots
      
      - run:
          name: Wait for MongoDB
          command: |
            for i in {1..60}; do
              if nc -z mongo 27017; then
                echo "MongoDB is ready!"
                break
              fi
              sleep 5
            done
      
      - run:
          name: Install Meteor
          command: |
            # Clear any existing Meteor installation
            rm -rf ~/.meteor
            # Install fresh Meteor
            curl https://install.meteor.com/?release=3.3 | sh
            echo 'export PATH="$HOME/.meteor:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            sudo ln -sf $HOME/.meteor/meteor /usr/local/bin/meteor
      
      - run:
          name: Clear Meteor build cache
          command: |
            # Clear local Meteor build cache
            rm -rf .meteor/local
            echo "Cleared .meteor/local directory"
            # Also clear npm cache to ensure fresh packages
            npm cache clean --force
      
      - run:
          name: Verify code changes
          command: |
            echo "Checking for @uiw/color-convert in package.json..."
            grep -q "@uiw/color-convert" package.json && echo "✓ Found @uiw/color-convert" || echo "✗ Missing @uiw/color-convert"
            
            echo "Checking for business pages import in App.jsx..."
            grep -q "from './pages/index.business.js'" imports/ui/App.jsx && echo "✓ Found business pages import" || echo "✗ Missing business pages import"
            
            echo "Checking DiagnosticReport REST config..."
            grep -A5 '"DiagnosticReport"' configs/settings.honeycomb.tdd.json | grep -q '"interactions"' && echo "✓ Found DiagnosticReport REST config" || echo "✗ Missing DiagnosticReport REST config"
      
      - run:
          name: Install dependencies
          command: |
            echo "Installing npm dependencies..."
            meteor npm install --verbose
            echo "npm install completed successfully"
            
            # Update browserslist database to avoid warnings
            echo "Updating browserslist database..."
            npx update-browserslist-db@latest || true
      
      - run:
          name: Pre-build Meteor packages
          no_output_timeout: 20m
          command: |
            echo "Pre-building Meteor packages..."
            echo "This step downloads and compiles Meteor packages to speed up the actual app start"
            
            # First, just download packages without building
            echo "Downloading Meteor packages..."
            meteor list || true
            
            # Run build with progress monitoring
            (
              meteor build --directory /tmp/build-test --debug &
              BUILD_PID=$!
              
              # Monitor progress
              START_TIME=$(date +%s)
              while kill -0 $BUILD_PID 2>/dev/null; do
                CURRENT_TIME=$(date +%s)
                ELAPSED=$((CURRENT_TIME - START_TIME))
                echo "[$(date)] Meteor packages building... (${ELAPSED}s elapsed)"
                
                # Check package cache size
                if [ -d ".meteor/local" ]; then
                  echo "Package cache size: $(du -sh .meteor/local 2>/dev/null | cut -f1)"
                fi
                
                sleep 30
              done
              
              wait $BUILD_PID
              BUILD_EXIT=$?
              echo "Build completed with exit code: $BUILD_EXIT"
              exit $BUILD_EXIT
            ) || {
              echo "Pre-build timed out or failed, but continuing..."
              echo "This is expected for large projects"
            }
            
            # Clean up
            rm -rf /tmp/build-test
            echo "Pre-build completed"
      
      - run:
          name: Debug Meteor packages
          command: |
            echo "=== Meteor Package Information ==="
            echo "--- .meteor/packages ---"
            cat .meteor/packages
            echo ""
            echo "--- .meteor/versions ---"
            cat .meteor/versions
            echo "=== End Package Information ==="
      
      - run:
          name: Start Meteor
          background: true
          no_output_timeout: 30m
          command: |
            # Set DEV_AUTO_LOGIN based on parameter
            if [ "<< parameters.disable-auto-login >>" = "true" ]; then
              export DEV_AUTO_LOGIN=false
              export DEV_AUTO_USERNAME=""
              export DEV_AUTO_PASSWORD=""
            fi
            echo "Starting Meteor at $(date)..."
            # Explicitly disable SyncedCron for tests
            export ENABLE_SYNCED_CRON=false
            export TEST_RUN=true
            # Add signal handling and verbose output
            trap 'echo "Received signal at $(date)"; exit' SIGTERM SIGINT
            # Run Meteor with explicit settings and all ONC packages loaded
            # Add periodic output to prevent timeout
            (
              meteor run --settings configs/settings.honeycomb.tdd.json --port 3000 \
                --extra-packages "clinical:reference-app, clinical:order-catalog, clinical:drug-interactions, clinical:secure-messaging, clinical:request-for-corrections, clinical:ccda-export, clinical:implantable-devices, clinical:e-prescribing, clinical:quality-measures, clinical:hipaa-compliance, clinical:clinical-lists, clinical:drug-formulary, clinical:syndromic-surveillance, clinical:family-health-history, clinical:social-determinants, clinical:structured-data-capture, clinical:case-reporting, clinical:cancer-registry-reporting, clinical:lab-test-reporting, clinical:immunization-registry, clinical:antimicrobial-reporting, clinical:pacio-core, clinical:accounts-management, clinical:multi-factor-auth, clinical:patient-matching" &
              METEOR_PID=$!

              # Output progress every 30 seconds to prevent timeout
              while kill -0 $METEOR_PID 2>/dev/null; do
                echo "[$(date)] Meteor is still starting up..."
                sleep 30
              done

              wait $METEOR_PID
            )
      
      - run:
          name: Wait for Meteor
          command: |
            for i in {1..120}; do
              if curl -f http://localhost:3000 > /dev/null 2>&1; then
                echo "Meteor is ready!"
                break
              fi
              echo "Waiting for Meteor... ($i/120)"
              sleep 5
            done
      
      - run:
          name: Run Nightwatch tests - << parameters.group-name >>
          command: |
            # Debug information
            echo "Starting test execution at: $(date)"
            echo "Current directory: $(pwd)"
            echo "Node version: $(node --version)"
            echo "NPM version: $(npm --version)"
            
            # Verify Meteor is still running
            echo "Checking Meteor status..."
            if ! curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "ERROR: Meteor is not responding on port 3000"
              echo "Checking processes:"
              ps aux | grep meteor || true
              exit 1
            fi
            echo "Meteor is running"
            
            echo "========================================"
            echo "Running test group: << parameters.group-name >>"
            echo "Test files: << parameters.test-files >>"
            echo "========================================"
            
            # Start ChromeDriver in background
            echo "Starting ChromeDriver..."
            /usr/local/bin/chromedriver --port=9515 --log-level=WARNING &> /tmp/chromedriver.log &
            CHROMEDRIVER_PID=$!
            
            # Wait for ChromeDriver
            sleep 5
            
            # Check if ChromeDriver is running
            if ! ps -p $CHROMEDRIVER_PID > /dev/null; then
              echo "ChromeDriver failed to start"
              cat /tmp/chromedriver.log
              exit 1
            fi
            
            echo "ChromeDriver is running with PID: $CHROMEDRIVER_PID"
            
            # Run tests
            echo "Starting Nightwatch tests..."
            export NIGHTWATCH_EXTERNAL_CHROMEDRIVER=true
            
            # Run tests without timeout command (might be causing the termination)
            TEST_FILES="<< parameters.test-files >>"
            npx nightwatch --config nightwatch.circle.conf.js $TEST_FILES || TEST_EXIT_CODE=$?
            
            # Cleanup
            kill $CHROMEDRIVER_PID 2>/dev/null || true
            
            echo "Test execution completed at: $(date)"
            exit ${TEST_EXIT_CODE:-0}
          no_output_timeout: 20m
      
      
      - store_test_results:
          path: tests/output
      
      - store_artifacts:
          path: tests/screenshots
          destination: screenshots

workflows:
  version: 2
  parallel-tests:
    jobs:
      # Run each test group in parallel
      - test-group:
          name: accounts
          group-name: accounts
          test-files: "tests/nightwatch/honeycomb/default/accounts.login.js tests/nightwatch/honeycomb/default/accounts.signup.js tests/nightwatch/honeycomb/default/accounts.viewports.js"
          disable-auto-login: true
      
      - test-group:
          name: actors
          group-name: actors
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.patients.js tests/nightwatch/honeycomb/enable_autopublish/crud.practitioners.js tests/nightwatch/honeycomb/enable_autopublish/crud.careteams.js"
      
      - test-group:
          name: clinical-history
          group-name: clinical-history
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.observations.js tests/nightwatch/honeycomb/enable_autopublish/crud.conditions.js tests/nightwatch/honeycomb/enable_autopublish/crud.encounters.js tests/nightwatch/honeycomb/enable_autopublish/crud.procedures.js"

