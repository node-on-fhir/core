# /Volumes/SonicMagic/Code/honeycomb-public-release/.circleci/research-testrunner-visibility-config.yml.txt
# CircleCI configuration with maximum test visibility
# Each test file runs as its own step for clear pass/fail status

version: 2.1

orbs:
  browser-tools: circleci/browser-tools@1.4.8

# Reusable commands for DRY configuration
commands:
  start-chromedriver:
    description: "Start ChromeDriver in the background"
    steps:
      - run:
          name: Start ChromeDriver
          background: true
          command: |
            CHROMEDRIVER_BIN=$(which chromedriver || echo "/usr/local/bin/chromedriver")
            echo "Starting ChromeDriver at $CHROMEDRIVER_BIN"
            $CHROMEDRIVER_BIN --port=9515 --silent --log-level=OFF &
            
            # Wait for ChromeDriver to be ready
            for i in {1..30}; do
              if curl -s http://localhost:9515/status | grep -q "ready"; then
                echo "ChromeDriver is ready"
                break
              fi
              sleep 1
            done

  stop-chromedriver:
    description: "Stop ChromeDriver process"
    steps:
      - run:
          name: Stop ChromeDriver
          command: |
            pkill -f chromedriver || true
            sleep 1

  run-single-test:
    description: "Run a single Nightwatch test file"
    parameters:
      test-path:
        type: string
        description: "Path to the test file relative to project root"
      test-name:
        type: string
        description: "Human-readable test name for the step"
    steps:
      - run:
          name: "Test: << parameters.test-name >>"
          command: |
            # Export test file for reporter
            export NIGHTWATCH_TEST_FILE="<< parameters.test-name >>"
            
            # Run the specific test file
            npx nightwatch --config .circleci/research/nightwatch.testrunnervisibility.conf.js << parameters.test-path >>
            
            # Capture exit code but don't fail immediately
            echo $? > /tmp/test-exit-code-<< parameters.test-name >>.txt
          no_output_timeout: 5m
          when: always

  setup-test-environment:
    description: "Set up the test environment"
    steps:
      - browser-tools/install-chrome
      - browser-tools/install-chromedriver
      - checkout
      
      - run:
          name: Create directories
          command: |
            mkdir -p $CIRCLE_ARTIFACTS $CIRCLE_TEST_REPORTS
            mkdir -p tests/output/logs tests/screenshots
            chmod -R 777 tests/output tests/screenshots
      
      - run:
          name: Wait for MongoDB
          command: |
            for i in {1..60}; do
              if nc -z mongo 27017; then
                echo "MongoDB is ready!"
                break
              fi
              sleep 5
            done
      
      - run:
          name: Install Meteor
          command: |
            curl https://install.meteor.com/?release=3.3 | sh
            echo 'export PATH="$HOME/.meteor:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            sudo ln -sf $HOME/.meteor/meteor /usr/local/bin/meteor
      
      - run:
          name: Install dependencies
          command: |
            meteor npm install
      
      - run:
          name: Start Meteor
          background: true
          command: |
            meteor run --settings configs/settings.honeycomb.localhost.json
      
      - run:
          name: Wait for Meteor
          command: |
            for i in {1..120}; do
              if curl -f http://localhost:3000 > /dev/null 2>&1; then
                echo "Meteor is ready!"
                break
              fi
              echo "Waiting for Meteor... ($i/120)"
              sleep 5
            done

jobs:
  test-e2e-visibility:
    docker:
      - image: cimg/node:20.11.0-browsers
        environment:
          CIRCLE_ARTIFACTS: /tmp/circleci-artifacts
          CIRCLE_TEST_REPORTS: /tmp/circleci-test-results
          TZ: "America/Chicago"
          NODE_ENV: test
          NIGHTWATCH: true
          DISPLAY: :99.0
          NODE_OPTIONS: --max_old_space_size=4096
          TOOL_NODE_FLAGS: --max_old_space_size=4096
          TEST_BROWSER_DRIVER: chrome
          MONGO_URL: mongodb://mongo:27017/meteor_test
          ENABLE_AUTOPUBLISH: true
          DEV_AUTO_LOGIN: true
          DEV_AUTO_USERNAME: "demouser"
          DEV_AUTO_PASSWORD: "password2025"
          TEST_RUN: true
      - image: mongo:6.0
        name: mongo
    
    resource_class: large
    
    steps:
      - setup-test-environment
      - start-chromedriver
      
      # Run each test file as a separate step for maximum visibility
      # Group: Account Tests
      - run-single-test:
          test-name: "Accounts - Login"
          test-path: "tests/nightwatch/honeycomb/default/accounts.login.js"
      
      - run-single-test:
          test-name: "Accounts - Signup"
          test-path: "tests/nightwatch/honeycomb/default/accounts.signup.js"
      
      - run-single-test:
          test-name: "Accounts - Viewports"
          test-path: "tests/nightwatch/honeycomb/default/accounts.viewports.js"
      
      # Group: CRUD Tests - Patient Management
      - run-single-test:
          test-name: "CRUD - Patients"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.patients.js"
      
      - run-single-test:
          test-name: "CRUD - Practitioners"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.practitioners.js"
      
      - run-single-test:
          test-name: "CRUD - Locations"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.locations.js"
      
      # Group: CRUD Tests - Clinical Resources
      - run-single-test:
          test-name: "CRUD - Observations"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.observations.js"
      
      - run-single-test:
          test-name: "CRUD - Conditions"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.conditions.js"
      
      - run-single-test:
          test-name: "CRUD - Medications"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.medications.js"
      
      - run-single-test:
          test-name: "CRUD - Medication Requests"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.medicationrequests.js"
      
      - run-single-test:
          test-name: "CRUD - Medication Administrations"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.medicationadministrations.js"
      
      # Group: CRUD Tests - Care Management
      - run-single-test:
          test-name: "CRUD - Care Plans"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.careplans.js"
      
      - run-single-test:
          test-name: "CRUD - Encounters"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.encounters.js"
      
      - run-single-test:
          test-name: "CRUD - Procedures"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.procedures.js"
      
      - run-single-test:
          test-name: "CRUD - Service Requests"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.servicerequests.js"
      
      # Group: CRUD Tests - Research & Questionnaires
      - run-single-test:
          test-name: "CRUD - Questionnaires"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.questionnaires.js"
      
      - run-single-test:
          test-name: "CRUD - Questionnaire Responses"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.questionnaireresponses.js"
      
      - run-single-test:
          test-name: "CRUD - Research Studies"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.researchstudy.js"
      
      - run-single-test:
          test-name: "CRUD - Research Subjects"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.researchsubjects.js"
      
      # Group: Other Tests
      - run-single-test:
          test-name: "CRUD - Devices"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/crud.devices.js"
      
      - run-single-test:
          test-name: "UI - Simple Sorting"
          test-path: "tests/nightwatch/honeycomb/enable_autopublish/simple-sorting-test.js"
      
      - run-single-test:
          test-name: "Profile - My Profile"
          test-path: "tests/nightwatch/honeycomb/dev_auto_login/my.profile.js"
      
      - run-single-test:
          test-name: "General - Localhost"
          test-path: "tests/nightwatch/honeycomb/default/localhost.js"
      
      # Check test results
      - run:
          name: Check Test Results
          command: |
            echo "=== Test Results Summary ==="
            FAILED_TESTS=""
            TOTAL_FAILED=0
            
            for result_file in /tmp/test-exit-code-*.txt; do
              if [ -f "$result_file" ]; then
                TEST_NAME=$(basename "$result_file" | sed 's/test-exit-code-//;s/.txt//')
                EXIT_CODE=$(cat "$result_file")
                if [ "$EXIT_CODE" != "0" ]; then
                  echo "❌ $TEST_NAME - FAILED"
                  FAILED_TESTS="$FAILED_TESTS\n  - $TEST_NAME"
                  TOTAL_FAILED=$((TOTAL_FAILED + 1))
                else
                  echo "✅ $TEST_NAME - PASSED"
                fi
              fi
            done
            
            if [ $TOTAL_FAILED -gt 0 ]; then
              echo -e "\n❌ $TOTAL_FAILED tests failed:$FAILED_TESTS"
              exit 1
            else
              echo -e "\n✅ All tests passed!"
            fi
          when: always
      
      - stop-chromedriver
      
      # Collect artifacts
      - run:
          name: Collect artifacts
          command: |
            if [ -d "tests/output" ]; then
              cp -r tests/output/* $CIRCLE_TEST_REPORTS/ || true
            fi
            if [ -d "tests/screenshots" ]; then
              cp -r tests/screenshots $CIRCLE_ARTIFACTS/ || true
            fi
          when: always
      
      - store_test_results:
          path: /tmp/circleci-test-results
      
      - store_artifacts:
          path: /tmp/circleci-artifacts
          destination: artifacts

workflows:
  version: 2
  test:
    jobs:
      - test-e2e-visibility

# Usage Notes:
# 1. This configuration runs each test file as a separate CircleCI step
# 2. Each test shows up individually in the CircleCI UI with clear pass/fail status
# 3. Failed tests are easy to identify and re-run
# 4. The configuration uses a minimal Nightwatch config to reduce noise
# 5. ChromeDriver is managed centrally and shared across all tests
# 6. Test results are collected and reported at the end
#
# To use this configuration:
# 1. Copy this file to .circleci/config.yml (removing the .txt extension)
# 2. Ensure the nightwatch.testrunnervisibility.conf.js file exists
# 3. Push to your branch and watch the tests run in CircleCI
#
# Benefits:
# - Maximum visibility: each test is a separate step
# - Easy to identify which specific test failed
# - Can re-run individual failed tests
# - Cleaner output with less verbosity
# - Better organization of test groups