# CircleCI configuration with parallel test execution
# Based on testrunner-visibility-config.yml but with parallelization

version: 2.1

orbs:
  browser-tools: circleci/browser-tools@1.4.8

# Define test groups for parallelization
parameters:
  test-groups:
    type: string
    default: |
      [
        {
          "name": "accounts",
          "tests": [
            "tests/nightwatch/honeycomb/default/accounts.login.js",
            "tests/nightwatch/honeycomb/default/accounts.signup.js",
            "tests/nightwatch/honeycomb/default/accounts.viewports.js"
          ]
        },
        {
          "name": "patient-management",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.patients.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.practitioners.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.locations.js"
          ]
        },
        {
          "name": "clinical-resources-1",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.observations.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.conditions.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.allergyintolerances.js"
          ]
        },
        {
          "name": "clinical-resources-2",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.medications.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.medicationrequests.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.medicationadministrations.js"
          ]
        },
        {
          "name": "clinical-resources-3",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.immunizations.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.diagnosticreports.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.imagingstudies.js"
          ]
        },
        {
          "name": "care-management",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.careplans.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.encounters.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.procedures.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.servicerequests.js"
          ]
        },
        {
          "name": "scheduling",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.appointments.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.schedules.js"
          ]
        },
        {
          "name": "research-questionnaires",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.questionnaires.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.questionnaireresponses.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.researchstudy.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.researchsubjects.js"
          ]
        },
        {
          "name": "administrative",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.devices.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.medias.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.consents.js"
          ]
        },
        {
          "name": "additional-clinical",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/crud.documentreferences.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.nutritionorders.js",
            "tests/nightwatch/honeycomb/enable_autopublish/crud.supplydeliveries.js"
          ]
        },
        {
          "name": "other-tests",
          "tests": [
            "tests/nightwatch/honeycomb/enable_autopublish/simple-sorting-test.js",
            "tests/nightwatch/honeycomb/dev_auto_login/my.profile.js",
            "tests/nightwatch/honeycomb/default/localhost.js"
          ]
        }
      ]

jobs:
  # Job template that runs a specific group of tests
  test-group:
    parameters:
      group-name:
        type: string
      test-files:
        type: string
    docker:
      - image: cimg/node:20.11.0-browsers
        environment:
          CIRCLE_ARTIFACTS: /tmp/circleci-artifacts
          CIRCLE_TEST_REPORTS: /tmp/circleci-test-results
          TZ: "America/Chicago"
          NODE_ENV: test
          NIGHTWATCH: true
          DISPLAY: :99.0
          NODE_OPTIONS: --max_old_space_size=4096
          TOOL_NODE_FLAGS: --max_old_space_size=4096
          TEST_BROWSER_DRIVER: chrome
          MONGO_URL: mongodb://mongo:27017/meteor_test
          ENABLE_AUTOPUBLISH: true
          DEV_AUTO_LOGIN: true
          DEV_AUTO_USERNAME: "demouser"
          DEV_AUTO_PASSWORD: "password2025"
          TEST_RUN: true
      - image: mongo:6.0
        name: mongo
    
    resource_class: medium  # Can use medium for parallel execution
    parallelism: 1  # Ensure we're not trying to parallelize within the job
    
    steps:
      - browser-tools/install-chrome
      - browser-tools/install-chromedriver
      - checkout
      
      - run:
          name: Verify Chrome and ChromeDriver
          command: |
            echo "Chrome version:"
            google-chrome --version || echo "Chrome not found"
            echo "ChromeDriver version:"
            chromedriver --version || echo "ChromeDriver not found"
            echo "ChromeDriver location:"
            which chromedriver || echo "ChromeDriver not in PATH"
      
      - run:
          name: Create directories
          command: |
            mkdir -p $CIRCLE_ARTIFACTS $CIRCLE_TEST_REPORTS
            mkdir -p tests/output tests/screenshots
      
      - run:
          name: Wait for MongoDB
          command: |
            for i in {1..60}; do
              if nc -z mongo 27017; then
                echo "MongoDB is ready!"
                break
              fi
              sleep 5
            done
      
      - run:
          name: Install Meteor
          command: |
            curl https://install.meteor.com/?release=3.3 | sh
            echo 'export PATH="$HOME/.meteor:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            sudo ln -sf $HOME/.meteor/meteor /usr/local/bin/meteor
      
      - run:
          name: Install dependencies
          command: meteor npm install
      
      - run:
          name: Start Meteor
          background: true
          command: |
            meteor run --settings configs/settings.honeycomb.localhost.json
      
      - run:
          name: Wait for Meteor
          command: |
            for i in {1..120}; do
              if curl -f http://localhost:3000 > /dev/null 2>&1; then
                echo "Meteor is ready!"
                break
              fi
              echo "Waiting for Meteor... ($i/120)"
              sleep 5
            done
      
      - run:
          name: "Setup and run test group: << parameters.group-name >>"
          command: |
            echo "========================================"
            echo "Running test group: << parameters.group-name >>"
            echo "Test files: << parameters.test-files >>"
            echo "========================================"
            
            # Start ChromeDriver
            echo "Starting ChromeDriver..."
            pkill -f chromedriver || true
            
            /usr/local/bin/chromedriver \
              --port=9515 \
              --allowed-ips= \
              --log-level=WARNING \
              > /tmp/chromedriver.log 2>&1 &
            
            CHROMEDRIVER_PID=$!
            echo "ChromeDriver started with PID: $CHROMEDRIVER_PID"
            
            # Wait for ChromeDriver
            for i in {1..10}; do
              if curl -s http://localhost:9515/status > /dev/null 2>&1; then
                echo "ChromeDriver is ready!"
                break
              fi
              echo "Waiting for ChromeDriver... ($i/10)"
              sleep 2
            done
            
            # Run tests
            echo "Running Nightwatch tests..."
            export NIGHTWATCH_EXTERNAL_CHROMEDRIVER=true
            
            # Run tests and capture exit code
            set +e
            npx nightwatch --config nightwatch.circle.conf.js << parameters.test-files >>
            TEST_EXIT_CODE=$?
            set -e
            
            # Stop ChromeDriver
            echo "Stopping ChromeDriver..."
            kill $CHROMEDRIVER_PID || true
            
            # Exit with test exit code
            exit $TEST_EXIT_CODE
          no_output_timeout: 20m
      
      
      - store_test_results:
          path: tests/output
      
      - store_artifacts:
          path: tests/screenshots
          destination: screenshots

workflows:
  version: 2
  parallel-tests:
    jobs:
      # Run each test group in parallel
      - test-group:
          name: test-accounts
          group-name: accounts
          test-files: "tests/nightwatch/honeycomb/default/accounts.login.js tests/nightwatch/honeycomb/default/accounts.signup.js tests/nightwatch/honeycomb/default/accounts.viewports.js"
      
      - test-group:
          name: test-patient-management
          group-name: patient-management
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.patients.js tests/nightwatch/honeycomb/enable_autopublish/crud.practitioners.js tests/nightwatch/honeycomb/enable_autopublish/crud.locations.js"
      
      - test-group:
          name: test-clinical-resources-1
          group-name: clinical-resources-1
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.observations.js tests/nightwatch/honeycomb/enable_autopublish/crud.conditions.js tests/nightwatch/honeycomb/enable_autopublish/crud.allergyintolerances.js"
      
      - test-group:
          name: test-clinical-resources-2
          group-name: clinical-resources-2
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.medications.js tests/nightwatch/honeycomb/enable_autopublish/crud.medicationrequests.js tests/nightwatch/honeycomb/enable_autopublish/crud.medicationadministrations.js"
      
      - test-group:
          name: test-clinical-resources-3
          group-name: clinical-resources-3
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.immunizations.js tests/nightwatch/honeycomb/enable_autopublish/crud.diagnosticreports.js tests/nightwatch/honeycomb/enable_autopublish/crud.imagingstudies.js"
      
      - test-group:
          name: test-care-management
          group-name: care-management
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.careplans.js tests/nightwatch/honeycomb/enable_autopublish/crud.encounters.js tests/nightwatch/honeycomb/enable_autopublish/crud.procedures.js tests/nightwatch/honeycomb/enable_autopublish/crud.servicerequests.js"
      
      - test-group:
          name: test-scheduling
          group-name: scheduling
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.appointments.js tests/nightwatch/honeycomb/enable_autopublish/crud.schedules.js"
      
      - test-group:
          name: test-research-questionnaires
          group-name: research-questionnaires
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.questionnaires.js tests/nightwatch/honeycomb/enable_autopublish/crud.questionnaireresponses.js tests/nightwatch/honeycomb/enable_autopublish/crud.researchstudy.js tests/nightwatch/honeycomb/enable_autopublish/crud.researchsubjects.js"
      
      - test-group:
          name: test-administrative
          group-name: administrative
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.devices.js tests/nightwatch/honeycomb/enable_autopublish/crud.medias.js tests/nightwatch/honeycomb/enable_autopublish/crud.consents.js"
      
      - test-group:
          name: test-additional-clinical
          group-name: additional-clinical
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/crud.documentreferences.js tests/nightwatch/honeycomb/enable_autopublish/crud.nutritionorders.js tests/nightwatch/honeycomb/enable_autopublish/crud.supplydeliveries.js"
      
      - test-group:
          name: test-other
          group-name: other-tests
          test-files: "tests/nightwatch/honeycomb/enable_autopublish/simple-sorting-test.js tests/nightwatch/honeycomb/dev_auto_login/my.profile.js tests/nightwatch/honeycomb/default/localhost.js"

# Benefits of this approach:
# 1. Tests run in parallel across multiple containers
# 2. Total test time reduced from ~2 hours to ~15-20 minutes
# 3. Each group is independent - can retry specific groups
# 4. Uses medium resource class (cheaper than large)
# 5. Groups are logically organized by functionality
# 6. Failed groups are easy to identify and re-run